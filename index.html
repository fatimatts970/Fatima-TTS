            { id: "it-IT-DiegoNeural", name: "Italian (IT) - Diego", lang: "Italian", gender: "Male", sample: "Benvenuti nello studio vocale Fatima." },
            { id: "ja-JP-NanamiNeural", name: "Japanese - Nanami", lang: "Japanese", gender: "Female", sample: "ファティマ音声スタジオへようこそ。" },
            { id: "ja-JP-KeitaNeural", name: "Japanese - Keita", lang: "Japanese", gender: "Male", sample: "ファティマ音声スタジオへようこそ。" },
            { id: "ms-MY-YasminNeural", name: "Malay (MY) - Yasmin", lang: "Malay", gender: "Female", sample: "Selamat datang ke Studio Suara Fatima." },
            { id: "ms-MY-OsmanNeural", name: "Malay (MY) - Osman", lang: "Malay", gender: "Male", sample: "Selamat datang ke Studio Suara Fatima." },
            { id: "pt-BR-FranciscaNeural", name: "Portuguese - Francisca", lang: "Portuguese", gender: "Female", sample: "Bem-vindo ao estúdio de voz Fatima." },
            { id: "pt-BR-AntonioNeural", name: "Portuguese - Antonio", lang: "Portuguese", gender: "Male", sample: "Bem-vindo ao estúdio de voz Fatima." },
            { id: "ru-RU-SvetlanaNeural", name: "Russian - Svetlana", lang: "Russian", gender: "Female", sample: "Добро пожаловать в голосовую студию Фатима." },
            { id: "ru-RU-DmitryNeural", name: "Russian - Dmitry", lang: "Russian", gender: "Male", sample: "Добро пожаловать в голосовую студию Фатима." },
            { id: "es-ES-ElviraNeural", name: "Spanish (ES) - Elvira", lang: "Spanish", gender: "Female", sample: "Bienvenido al estudio de voz Fatima." },
            { id: "es-ES-AlvaroNeural", name: "Spanish (ES) - Alvaro", lang: "Spanish", gender: "Male", sample: "Bienvenido al estudio de voz Fatima." }
        ];

        let favorites = JSON.parse(localStorage.getItem('tts_favorites')) || [];
        let currentTab = 'all';
        let selectedVoiceId = "ur-PK-UzmaNeural"; // Default initialization[span_4](start_span)[span_4](end_span)

        // Populates hidden select dropdown exactly like original zip system requirement[span_5](start_span)[span_5](end_span)
        function initSelectOptions() {
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '';
            allVoices.forEach(voice => {
                const opt = document.createElement('option');
                opt.value = voice.id;
                opt.innerText = voice.name;
                select.appendChild(opt);
            });
            select.value = selectedVoiceId;
        }

        function selectVoiceCard(id) {
            selectedVoiceId = id;
            document.getElementById('voiceSelect').value = id; // Update hidden standard selector logic[span_6](start_span)[span_6](end_span)
            renderVoices();
        }

        function renderVoices() {
            const container = document.getElementById('voicesContainer');
            const searchQuery = document.getElementById('searchVoice').value.toLowerCase();
            container.innerHTML = '';

            let filtered = allVoices.filter(v => {
                const matchesSearch = v.name.toLowerCase().includes(searchQuery) || v.lang.toLowerCase().includes(searchQuery);
                if (currentTab === 'fav') {
                    return matchesSearch && favorites.includes(v.id);
                }
                return matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-xs text-gray-600">No voices found matching criteria.</div>`;
                return;
            }

            filtered.forEach(voice => {
                const isFav = favorites.includes(voice.id);
                const isSelected = voice.id === selectedVoiceId;
                const item = document.createElement('div');
                
                // Clicking anywhere on card handles selection state updates perfectly[span_7](start_span)[span_7](end_span)
                item.className = `flex items-center justify-between bg-slate-950/40 border border-slate-900 rounded-xl p-3.5 cursor-pointer transition-all ${isSelected ? 'selected-voice-card' : 'hover:border-purple-900/40'}`;
                item.setAttribute('onclick', `selectVoiceCard('${voice.id}')`);

                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center">
                            <i class="fa-solid fa-user text-xs ${isSelected ? 'text-purple-400' : 'text-gray-500'}"></i>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-gray-200">${voice.name}</h4>
                            <p class="text-[10px] text-gray-500">[${voice.lang} - ${voice.gender}]</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2" onclick="event.stopPropagation();">
                        <button onclick="playVoice('${voice.id}', this)" class="w-7 h-7 bg-slate-900 border border-slate-800 text-gray-400 hover:text-purple-400 rounded-lg flex items-center justify-center text-xs transition-colors">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="toggleFavorite('${voice.id}')" class="w-7 h-7 bg-slate-900 border border-slate-800 ${isFav ? 'text-amber-500' : 'text-gray-500'} hover:text-amber-500 rounded-lg flex items-center justify-center text-xs transition-colors">
                            <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function playVoice(voiceId, btnEl) {
            // First select the voice item instantly
            selectVoiceCard(voiceId);
            
            let script = document.getElementById('textScript').value.trim();
            
            // Zip standard logic: Use default string localized array variables if text block remains blank
            if (!script) {
                const voiceObj = allVoices.find(v => v.id === voiceId);
                script = voiceObj ? voiceObj.sample : "Welcome";
            }

            const icon = btnEl.querySelector('i');
            icon.className = "fa-solid fa-spinner animate-spin text-purple-400";

            try {
                // FIXED backend tracking endpoint matching your live Flask app structure precisely[span_8](start_span)[span_8](end_span)
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: script, voice: voiceId })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const player = document.getElementById('audioPlayer');
                    player.src = url;
                    player.play();
                    
                    player.onended = () => { icon.className = "fa-solid fa-play"; };
                } else {
                    alert("Voice processing workflow failed.");
                    icon.className = "fa-solid fa-play";
                }
            } catch (err) {
                alert("Network pipeline execution error.");
                icon.className = "fa-solid fa-play";
            }
        }

        function toggleFavorite(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('tts_favorites', JSON.stringify(favorites));
            renderVoices();
        }

        function filterVoices() {
            renderVoices();
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabAll = document.getElementById('tabAll');
            const tabFav = document.getElementById('tabFav');

            if (tab === 'all') {
                tabAll.className = "btn-purple text-white font-bold py-2.5 px-3 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md shadow-purple-600/10 transition-all";
                tabFav.className = "bg-slate-950 border border-slate-800 text-gray-400 font-semibold py-2.5 px-3 rounded-xl text-xs flex items-center justify-center gap-2 hover:text-gray-200 transition-all";
            } else {
                tabFav.className = "btn-purple text-white font-bold py-2.5 px-3 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md shadow-purple-600/10 transition-all";
                tabAll.className = "bg-slate-950 border border-slate-800 text-gray-400 font-semibold py-2.5 px-3 rounded-xl text-xs flex items-center justify-center gap-2 hover:text-gray-200 transition-all";
            }
            renderVoices();
        }

        // AdSense Integration Data Array Configuration
        const pageData = {
            about: {
                title: "About Us",
                content: "<p>Welcome to <strong>Fatima TTS</strong>, a premium, high-performance Text-to-Speech studio utility tool designed to convert your scripts into crystal-clear realistic voiceovers instantly.</p><p>We specialize in processing natural language workflows using cutting-edge dynamic media rendering models to deliver fast, seamless speech generation features worldwide.</p>"
            },
            privacy: {

                content: "<p>At Fatima TTS, we prioritize user data protection. We do not store, retain, or save any script data or user input on our server pipelines.</p><p>All generated dynamic audio outputs are streamed instantly and temporarily processed. We do not use persistent tracking cookies, ensuring a secure environment for all content creation processes.</p>"
            },
            terms: {
                title: "Terms & Conditions",
                content: "<p>By utilizing the tools provided on Fatima TTS, you agree to access our services in a fair and non-malicious manner. Our platform is provided 'as-is' without liability for network level execution dropouts.</p><p>Automated scraping or spamming of the voice generation application programming interfaces is strictly prohibited to maintain premium speeds for everyone.</p>"
            },
            contact: {
                title: "Contact Us",
                content: "<p>Have questions, business inquiries, or technical feedback regarding Fatima TTS? Reach out directly via our official channel infrastructure.</p><p><strong>Email support:</strong> anjaanshahzadi27@gmail.com</p><p>We value user input and aim to respond within 24 to 48 standard tracking hours.</p>"
            }
        };

        function openPolicy(key) {
            document.getElementById('modalTitle').innerText = pageData[key].title;
            document.getElementById('modalContent').innerHTML = pageData[key].content;
            document.getElementById('policyModal').classList.remove('hidden');
        }
        function closePolicy() {
            document.getElementById('policyModal').classList.add('hidden');
        }
        window.onclick = function(event) {
            let m = document.getElementById('policyModal');
            if (event.target == m) m.classList.add('hidden');
        }

        window.onload = function() {
            initSelectOptions();
            renderVoices();
        };
